name: Integration Test on PR

on:
    pull_request:
        types: [opened, reopened, synchronize, ready_for_review]
        branches:
        -   main

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}-run-test
    cancel-in-progress: true

jobs:
    integration_test:
        name: Integration Test
        runs-on: [self-hosted, magi-compiler]
        timeout-minutes: 30
        env:
            http_proxy: ${{ secrets.HTTP_PROXY }}
            https_proxy: ${{ secrets.HTTPS_PROXY }}
            no_proxy: localhost,127.0.0.1,::1
            PIP_INDEX_URL: https://pypi.tuna.tsinghua.edu.cn/simple
            PIP_TRUSTED_HOST: pypi.tuna.tsinghua.edu.cn
            GIT_HTTP_CONNECT_TIMEOUT: 10   # Connection timeout in seconds
            GIT_HTTP_LOW_SPEED_LIMIT: 100  # Minimum speed threshold (bytes/s)
            GIT_HTTP_LOW_SPEED_TIME: 10    # Abort if below threshold for this many seconds
        permissions:
            pull-requests: read
            contents: read
        defaults:
            run:
                shell: bash
        steps:
        -   name: Configure git proxy
            run: |
                git config --global http.proxy "${{ secrets.HTTP_PROXY }}"
                git config --global https.proxy "${{ secrets.HTTPS_PROXY }}"

        -   name: Checkout PR head with retry
            timeout-minutes: 10
            run: |
                set -euo pipefail
                repo_url="https://github.com/${{ github.repository }}.git"
                base_sha="${{ github.event.pull_request.base.sha }}"
                head_sha="${{ github.event.pull_request.head.sha }}"

                if git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
                    git remote set-url origin "$repo_url" 2>/dev/null || git remote add origin "$repo_url"
                else
                    git init .
                    git remote add origin "$repo_url"
                fi

                cleanup_git_locks() {
                    rm -f .git/shallow.lock \
                          .git/index.lock \
                          .git/packed-refs.lock \
                          .git/FETCH_HEAD.lock \
                          .git/config.lock
                }

                for attempt in $(seq 1 15); do
                    cleanup_git_locks
                    echo "[checkout] attempt ${attempt}/15"

                    if [ $((attempt % 2)) -eq 1 ]; then
                        echo "[checkout] mode=proxy strict(lowSpeed=100/10)"
                        fetch_cmd=(
                            timeout 1m
                            git -c http.lowSpeedLimit=100 -c http.lowSpeedTime=10
                            fetch --no-tags --prune --depth=1 origin
                            "$base_sha" "$head_sha"
                        )
                    else
                        echo "[checkout] mode=direct relaxed(lowSpeed=1/30)"
                        fetch_cmd=(
                            env -u http_proxy -u https_proxy -u HTTP_PROXY -u HTTPS_PROXY
                            timeout 1m
                            git -c http.proxy= -c https.proxy= -c http.lowSpeedLimit=1 -c http.lowSpeedTime=30
                            fetch --no-tags --prune --depth=1 origin
                            "$base_sha" "$head_sha"
                        )
                    fi

                    if "${fetch_cmd[@]}"; then
                        break
                    fi

                    if [ "$attempt" -eq 15 ]; then
                        echo "[checkout] failed after 15 attempts"
                        exit 1
                    fi

                    cleanup_git_locks
                    echo "[checkout] fetch timeout/failure, retry in 5s"
                    sleep 5
                done

                cleanup_git_locks
                git checkout --force "$head_sha"
                git clean -fdx
                git reset --hard "$head_sha"
                git rev-parse "$base_sha"
                git rev-parse "$head_sha"
                git log -1 --oneline
                git diff --name-only "$base_sha".."$head_sha" | head -n 20
                echo "[checkout] done"

        -   name: Check Chinese Characters
            run: python3 .github/workflows/check_chinese_chars.py
            env:
                BASE_REF: ${{ github.event.pull_request.base.sha }}
                HEAD_REF: ${{ github.event.pull_request.head.sha }}

        -   name: Check Code Style
            run: pre-commit run --show-diff-on-failure --color=always --all-files

        -   name: Install MagiCompiler
            run: pip install --no-build-isolation --force-reinstall . --break-system-packages

        -   name: Install test dependencies
            run: pip install -r requirements-test.txt --break-system-packages

        -   name: Run MagiCompiler Unit Tests
            run: pytest -v tests/
