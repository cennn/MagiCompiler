name: Integration Test on PR

on:
    pull_request:
        types: [opened, reopened, synchronize, ready_for_review]
        branches:
        -   main

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}-run-test
    cancel-in-progress: true

jobs:
    integration_test:
        name: Integration Test
        runs-on: [self-hosted, magi-compiler]
        timeout-minutes: 30
        env:
            http_proxy: ${{ secrets.HTTP_PROXY }}
            https_proxy: ${{ secrets.HTTPS_PROXY }}
            no_proxy: localhost,127.0.0.1,::1
            PIP_INDEX_URL: https://pypi.tuna.tsinghua.edu.cn/simple
            PIP_TRUSTED_HOST: pypi.tuna.tsinghua.edu.cn
            GIT_HTTP_CONNECT_TIMEOUT: 10   # Connection timeout in seconds
            GIT_HTTP_LOW_SPEED_LIMIT: 100  # Minimum speed threshold (bytes/s)
            GIT_HTTP_LOW_SPEED_TIME: 10    # Abort if below threshold for this many seconds
        permissions:
            pull-requests: read
            contents: read
        defaults:
            run:
                shell: bash
        steps:
        -   name: Configure git proxy
            run: |
                git config --global http.proxy "${{ secrets.HTTP_PROXY }}"
                git config --global https.proxy "${{ secrets.HTTPS_PROXY }}"

        -   name: Checkout PR head with retry
            timeout-minutes: 15
            run: |
                set -euo pipefail
                repo_url="https://github.com/${{ github.repository }}.git"

                git init .
                git remote add origin "$repo_url"

                for attempt in $(seq 1 15); do
                    echo "[checkout] attempt ${attempt}/15"
                    if git fetch --no-tags --prune --depth=1 origin \
                        "${{ github.event.pull_request.base.sha }}" \
                        "${{ github.event.pull_request.head.sha }}"; then
                        break
                    fi

                    if [ "$attempt" -eq 15 ]; then
                        echo "[checkout] failed after 15 attempts"
                        exit 1
                    fi

                    echo "[checkout] fetch failed, retry in 20s"
                    sleep 20
                done

                git checkout --force "${{ github.event.pull_request.head.sha }}"
                git clean -fdx
                git reset --hard "${{ github.event.pull_request.head.sha }}"
                git rev-parse "${{ github.event.pull_request.base.sha }}"
                git rev-parse "${{ github.event.pull_request.head.sha }}"
                git log -1 --oneline
                git diff --name-only "${{ github.event.pull_request.base.sha }}"..."${{ github.event.pull_request.head.sha }}" | head -n 20
                echo "[checkout] done"

        -   name: Check Chinese Characters
            run: python3 .github/workflows/check_chinese_chars.py
            env:
                BASE_REF: ${{ github.event.pull_request.base.sha }}
                HEAD_REF: ${{ github.event.pull_request.head.sha }}

        -   name: Check Code Style
            run: pre-commit run --show-diff-on-failure --color=always --all-files

        -   name: Install MagiCompiler
            run: pip install --no-build-isolation --force-reinstall . --break-system-packages

        -   name: Install test dependencies
            run: pip install -r requirements-test.txt --break-system-packages

        -   name: Run MagiCompiler Unit Tests
            run: pytest -v tests/
